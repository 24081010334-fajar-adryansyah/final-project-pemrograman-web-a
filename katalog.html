<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Produk - PELAN-PELAN TAPI Pastry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body class="bg-[#FFFFFF] min-h-screen flex flex-col justify-between m-0 p-0 box-border text-gray-800">

    <div>
       <nav class="bg-[#925E3F] px-6 py-3 flex justify-between items-center shadow-md rounded-[15px] mx-4 mt-2">
        <div class="flex items-center">
            <img src="images/croissant.png" alt="Logo Croissant" class="h-12 w-auto object-contain" width="50px">
        </div>
    
        <div class="bg-white text-[#925E3F] w-10 h-10 rounded-full flex justify-center items-center shadow-inner cursor-pointer hover:bg-gray-100 transition">
            <i class="fa-solid fa-user text-xl"></i>
         </div>
        </nav>

        <main class="max-w-[1200px] mx-auto px-6 py-6 w-full">
            
            <div class="mb-8">
                <button class="flex items-center gap-2 px-4 py-2 border-2 border-[#BD8A58] text-[#925E3F] font-bold text-xs uppercase tracking-wider rounded-full hover:bg-[#BD8A58]/10 transition shadow-sm active:scale-95">
                    Tambah Produk
                    <span class="bg-[#BD8A58] text-white w-6 h-6 rounded-full flex justify-center items-center text-sm font-bold">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </span>
                </button>
            </div>

            <div>
                <h3 class="text-xs font-bold text-[#925E3F] uppercase tracking-wider mb-4 px-2">Tabel Produk</h3>
                
                <div class="bg-[#925E3F] text-white text-xs font-bold uppercase py-3.5 px-6 rounded-[14px] grid grid-cols-3 text-center tracking-wider">
                    <div>Foto Produk</div>
                    <div>Detail Produk</div>
                    <div>Edit / Hapus Produk</div>
                </div>

                <div class="flex flex-col gap-3.5 mt-3.5">
                    
                    <div class="bg-[#FFF8F1] border border-[#BD8A58]/20 rounded-[18px] p-4 grid grid-cols-3 items-center text-center shadow-sm hover:shadow-md transition">
                        <div class="flex justify-center">
                            <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=200&auto=format&fit=crop" alt="Strawberry Cream Cake" class="w-16 h-16 object-cover rounded-lg">
                        </div>
                        <div class="font-semibold text-[#BD8A58] text-sm md:text-base">Strawberry Cream Cake</div>
                        <div class="flex justify-center gap-4 text-xl text-gray-700">
                            <button class="hover:text-amber-600 transition"><i class="fa-regular fa-pen-to-square"></i></button>
                            <button class="hover:text-red-600 transition"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>

                    <div class="bg-[#FFF8F1] border border-[#BD8A58]/20 rounded-[18px] p-4 grid grid-cols-3 items-center text-center shadow-sm hover:shadow-md transition">
                        <div class="flex justify-center">
                            <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?q=80&w=200&auto=format&fit=crop" alt="Cookies" class="w-16 h-16 object-cover rounded-lg">
                        </div>
                        <div class="font-semibold text-[#BD8A58] text-sm md:text-base">Strawberry Cream Cake</div>
                        <div class="flex justify-center gap-4 text-xl text-gray-700">
                            <button class="hover:text-amber-600 transition"><i class="fa-regular fa-pen-to-square"></i></button>
                            <button class="hover:text-red-600 transition"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>

                    <div class="bg-[#FFF8F1] border border-[#BD8A58]/20 rounded-[18px] p-4 grid grid-cols-3 items-center text-center shadow-sm hover:shadow-md transition">
                        <div class="flex justify-center">
                            <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=200&auto=format&fit=crop" alt="Cinnamon Roll" class="w-16 h-16 object-cover rounded-lg">
                        </div>
                        <div class="font-semibold text-[#BD8A58] text-sm md:text-base">Strawberry Cream Cake</div>
                        <div class="flex justify-center gap-4 text-xl text-gray-700">
                            <button class="hover:text-amber-600 transition"><i class="fa-regular fa-pen-to-square"></i></button>
                            <button class="hover:text-red-600 transition"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>

                    <div class="bg-[#FFF8F1] border border-[#BD8A58]/20 rounded-[18px] p-4 grid grid-cols-3 items-center text-center shadow-sm hover:shadow-md transition">
                        <div class="flex justify-center">
                            <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=200&auto=format&fit=crop" alt="Pastry" class="w-16 h-16 object-cover rounded-lg">
                        </div>
                        <div class="font-semibold text-[#BD8A58] text-sm md:text-base">Strawberry Cream Cake</div>
                        <div class="flex justify-center gap-4 text-xl text-gray-700">
                            <button class="hover:text-amber-600 transition"><i class="fa-regular fa-pen-to-square"></i></button>
                            <button class="hover:text-red-600 transition"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>

                    <div class="bg-[#FFF8F1] border border-[#BD8A58]/20 rounded-[18px] p-4 grid grid-cols-3 items-center text-center shadow-sm hover:shadow-md transition">
                        <div class="flex justify-center">
                            <img src="https://images.unsplash.com/photo-1607958996333-41aef7caefaa?q=80&w=200&auto=format&fit=crop" alt="Muffin" class="w-16 h-16 object-cover rounded-lg">
                        </div>
                        <div class="font-semibold text-[#BD8A58] text-sm md:text-base">Strawberry Cream Cake</div>
                        <div class="flex justify-center gap-4 text-xl text-gray-700">
                            <button class="hover:text-amber-600 transition"><i class="fa-regular fa-pen-to-square"></i></button>
                            <button class="hover:text-red-600 transition"><i class="fa-regular fa-trash-can"></i></button>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <footer class="bg-[#925E3F] text-white/90 text-[11px] md:text-xs px-6 py-3 flex justify-between items-center rounded-[15px] mx-4 mb-2 shadow-inner">
        <div>
            <span class="font-bold tracking-wider">PELAN - PELAN TAPI</span> <span class="italic font-light">Pastry</span>
        </div>
        <div class="tracking-wide">
            Copyright
        </div>
    </footer>

    <script>
        // Logika hapus baris simulasi saat tombol tempat sampah ditekan
        document.querySelectorAll('.fa-trash-can').forEach(button => {
            button.parentElement.addEventListener('click', function() {
                if(confirm('Apakah Anda yakin ingin menghapus produk ini?')) {
                    this.closest('.grid').remove();
                }
            });
        });
    </script>
</body>
</html>
