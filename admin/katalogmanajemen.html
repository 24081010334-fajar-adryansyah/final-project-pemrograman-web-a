<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog Produk — Pelan Pelan Tapi Pastry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brown: {
              50:  '#fdf6ee',
              100: '#f5e6d0',
              200: '#eacba0',
              300: '#dba96d',
              400: '#c8873f',
              500: '#7a4419',
              600: '#6b3a15',
              700: '#5a3010',
              800: '#3d1f09',
              900: '#2a1505',
            },
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body:    ['Nunito', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .modal-backdrop { backdrop-filter: blur(2px); }
    .product-row { transition: background 0.15s; }
    .product-row:hover { background: #fdf6ee; }
    .btn-icon { transition: transform 0.15s, opacity 0.15s; }
    .btn-icon:hover { transform: scale(1.15); opacity: 0.8; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.2s ease; }
    @keyframes slideDown { from { opacity:0; max-height:0; } to { opacity:1; max-height:300px; } }
    .animate-slideDown { animation: slideDown 0.25s ease; overflow:hidden; }
  </style>
</head>
<body class="bg-brown-50 min-h-screen flex flex-col">

  <!-- ========== NAVBAR ========== -->
  <header class="bg-brown-600 px-6 py-3 flex items-center justify-between shadow-md sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <span class="text-3xl select-none">🥐</span>
    </div>
    <div class="w-9 h-9 rounded-full bg-brown-300 flex items-center justify-center text-brown-800 cursor-pointer hover:bg-brown-200 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="flex-1 px-6 py-5 max-w-4xl w-full mx-auto">

    <!-- Tambah Produk Button -->
    <div class="mb-4">
      <button id="btnTambah"
        onclick="toggleFormTambah()"
        class="flex items-center gap-2 bg-white border-2 border-brown-500 text-brown-600 font-bold text-sm px-4 py-2 rounded-xl hover:bg-brown-500 hover:text-white transition-all duration-200 shadow-sm">
        <span class="font-display font-semibold tracking-wide">TAMBAH PRODUK</span>
        <span class="w-7 h-7 rounded-full bg-brown-500 text-white flex items-center justify-center text-lg leading-none hover:bg-white hover:text-brown-600 transition">+</span>
      </button>
    </div>

    <!-- ========== FORM TAMBAH (State 2) ========== -->
    <div id="formTambah" class="hidden animate-slideDown mb-5">
      <div class="bg-white rounded-2xl border border-brown-200 shadow-sm p-5">
        <p class="font-bold text-brown-700 text-sm mb-4 tracking-wide">FORM DATA PRODUK</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-3">
          <div>
            <label class="block text-xs font-semibold text-brown-600 mb-1">Nama Produk</label>
            <input id="inp-nama" type="text" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" placeholder="Contoh: Croissant Coklat" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-brown-600 mb-1">Stok</label>
            <input id="inp-stok" type="number" min="0" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" placeholder="Jumlah stok" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-brown-600 mb-1">Harga</label>
            <input id="inp-harga" type="text" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" placeholder="Rp 0" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-brown-600 mb-1">Kategori</label>
            <select id="inp-kategori" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50 appearance-none">
              <option value="">-- Pilih Kategori --</option>
              <option>Cake</option>
              <option>Cookies</option>
              <option>Pastry</option>
              <option>Cupcake</option>
              <option>Waffle</option>
              <option>Roll Cake</option>
            </select>
          </div>
          <div class="sm:col-span-2">
            <label class="block text-xs font-semibold text-brown-600 mb-1">Status</label>
            <input id="inp-status" type="text" class="w-full sm:w-1/2 border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" placeholder="Tersedia / Habis" />
          </div>
        </div>
        <div class="mt-4 flex justify-end gap-3">
          <button onclick="toggleFormTambah()" class="px-4 py-2 rounded-lg border border-brown-300 text-brown-600 text-sm font-semibold hover:bg-brown-100 transition">Batal</button>
          <button onclick="simpanProdukBaru()" class="px-5 py-2 rounded-lg bg-brown-500 text-white text-sm font-bold hover:bg-brown-600 transition shadow">Simpan</button>
        </div>
      </div>
    </div>

    <!-- ========== TABEL PRODUK (State 1 / 5) ========== -->
    <div>
      <p class="font-bold text-brown-800 text-sm tracking-widest mb-3">TABEL PRODUK</p>
      <div class="bg-white rounded-2xl border border-brown-200 shadow-sm overflow-hidden">
        <!-- Table Header -->
        <div class="grid grid-cols-[160px_1fr_140px] bg-brown-600 text-white text-xs font-bold tracking-widest px-4 py-3">
          <span>FOTO PRODUK</span>
          <span class="text-center">DETAIL PRODUK</span>
          <span class="text-center">EDIT / HAPUS PRODUK</span>
        </div>

        <!-- Table Body -->
        <div id="tableBody" class="divide-y divide-brown-100">
          <!-- Rows injected by JS -->
        </div>
      </div>
    </div>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="bg-brown-700 text-white px-6 py-3 flex justify-between items-center text-sm mt-auto">
    <span class="font-body">PELAN – PELAN TAPI <em class="font-display italic">Pastry</em></span>
    <span class="text-brown-300 text-xs">Copyright</span>
  </footer>

  <!-- ========== MODAL EDIT (State 3) ========== -->
  <div id="modalEdit" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-backdrop bg-black/30">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-6 animate-fadeIn">
      <p class="font-bold text-brown-700 text-sm mb-4 tracking-wide">UBAH DETAIL PRODUK <span id="editNamaJudul" class="uppercase"></span></p>
      <div class="grid grid-cols-2 gap-x-5 gap-y-3">
        <div>
          <label class="block text-xs font-semibold text-brown-600 mb-1">Nama Produk</label>
          <input id="edit-nama" type="text" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-brown-600 mb-1">Stok</label>
          <input id="edit-stok" type="number" min="0" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-brown-600 mb-1">Harga</label>
          <input id="edit-harga" type="text" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-brown-600 mb-1">Kategori</label>
          <select id="edit-kategori" class="w-full border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50 appearance-none">
            <option value="">-- Pilih --</option>
            <option>Cake</option>
            <option>Cookies</option>
            <option>Pastry</option>
            <option>Cupcake</option>
            <option>Waffle</option>
            <option>Roll Cake</option>
          </select>
        </div>
        <div class="col-span-2">
          <label class="block text-xs font-semibold text-brown-600 mb-1">Status</label>
          <input id="edit-status" type="text" class="w-full sm:w-1/2 border border-brown-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brown-400 bg-brown-50" />
        </div>
      </div>
      <div class="mt-5 flex justify-end gap-3">
        <button onclick="tutupModalEdit()" class="px-4 py-2 rounded-lg border border-brown-300 text-brown-600 text-sm font-semibold hover:bg-brown-100 transition">Batal</button>
        <button onclick="simpanEdit()" class="px-5 py-2 rounded-lg bg-green-500 text-white text-sm font-bold hover:bg-green-600 transition shadow">Simpan</button>
      </div>
    </div>
  </div>

  <!-- ========== MODAL HAPUS (State 4) ========== -->
  <div id="modalHapus" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-backdrop bg-black/30">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-6 animate-fadeIn text-center">
      <div class="text-4xl mb-2">⚠️</div>
      <p class="font-bold text-red-600 text-sm tracking-wide mb-1">KONFIRMASI PENGHAPUSAN</p>
      <div class="flex items-center justify-center gap-3 my-3">
        <span id="hapusEmoji" class="text-3xl"></span>
        <p class="text-brown-700 text-sm">Apakah Anda yakin ingin menghapus produk <strong id="hapusNama" class="text-brown-800"></strong>?</p>
      </div>
      <div class="flex justify-center gap-3 mt-4">
        <button onclick="tutupModalHapus()" class="flex items-center gap-1 px-4 py-2 rounded-lg border border-brown-300 text-brown-600 text-sm font-semibold hover:bg-brown-100 transition">
          <span>✕</span> Tidak, Batal
        </button>
        <button onclick="konfirmasiHapus()" class="flex items-center gap-1 px-4 py-2 rounded-lg bg-red-500 text-white text-sm font-bold hover:bg-red-600 transition shadow">
          <span>🗑</span> Iya, Hapus
        </button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST NOTIFIKASI ========== -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] bg-brown-700 text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-lg animate-fadeIn">
    <span id="toastMsg"></span>
  </div>

<script>
  // ===== DATA PRODUK =====
  let produkList = [
    { id:1, nama:'Strawberry Cream Cake', harga:'Rp 85.000', stok:12, kategori:'Cake',     status:'Tersedia', emoji:'🍰' },
    { id:2, nama:'Chocolate Chip Cookies', harga:'Rp 35.000', stok:50, kategori:'Cookies',  status:'Tersedia', emoji:'🍪' },
    { id:3, nama:'Cinnamon Roll',          harga:'Rp 28.000', stok:20, kategori:'Pastry',   status:'Tersedia', emoji:'🥐' },
    { id:4, nama:'Strawberry Shortcake',   harga:'Rp 65.000', stok:8,  kategori:'Cake',     status:'Tersedia', emoji:'🍓' },
    { id:5, nama:'Swiss Roll Cake',        harga:'Rp 72.000', stok:6,  kategori:'Roll Cake',status:'Tersedia', emoji:'🎂' },
    { id:6, nama:'Cherry Cupcake',         harga:'Rp 22.000', stok:30, kategori:'Cupcake',  status:'Tersedia', emoji:'🧁' },
    { id:7, nama:'Crispy Waffle',          harga:'Rp 30.000', stok:15, kategori:'Waffle',   status:'Tersedia', emoji:'🧇' },
    { id:8, nama:'Vanilla Cupcake',        harga:'Rp 20.000', stok:25, kategori:'Cupcake',  status:'Tersedia', emoji:'🧁' },
    { id:9, nama:'Dark Chocolate Muffin',  harga:'Rp 25.000', stok:18, kategori:'Cupcake',  status:'Tersedia', emoji:'🍫' },
    { id:10,nama:'Mocha Cupcake',          harga:'Rp 22.000', stok:22, kategori:'Cupcake',  status:'Tersedia', emoji:'☕' },
    { id:11,nama:'Triple Choco Cupcake',   harga:'Rp 24.000', stok:19, kategori:'Cupcake',  status:'Tersedia', emoji:'🍫' },
  ];
  let nextId = 12;
  let editTarget = null;
  let hapusTarget = null;
  let formVisible = false;

  // ===== RENDER TABLE =====
  function render() {
    const tbody = document.getElementById('tableBody');
    if (produkList.length === 0) {
      tbody.innerHTML = `<div class="py-12 text-center text-brown-400 text-sm font-semibold">Belum ada produk. Klik "Tambah Produk" untuk menambahkan.</div>`;
      return;
    }
    tbody.innerHTML = produkList.map((p, i) => `
      <div class="product-row grid grid-cols-[160px_1fr_140px] items-center px-4 py-3 gap-2 ${i%2===0?'bg-white':'bg-brown-50/40'}">
        <div class="flex items-center justify-center">
          <div class="w-14 h-14 rounded-xl bg-brown-100 flex items-center justify-center text-3xl shadow-sm border border-brown-200">${p.emoji}</div>
        </div>
        <div class="text-center">
          <p class="font-bold text-brown-500 text-sm">${p.nama}</p>
          <p class="text-xs text-brown-400 mt-0.5">${p.harga} · Stok: ${p.stok} · ${p.kategori}</p>
          <span class="inline-block mt-1 text-xs px-2 py-0.5 rounded-full ${p.stok>0?'bg-green-100 text-green-700':'bg-red-100 text-red-600'} font-semibold">${p.status}</span>
        </div>
        <div class="flex items-center justify-center gap-4">
          <button class="btn-icon text-brown-400 hover:text-brown-600" title="Edit" onclick="bukaModalEdit(${p.id})">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.536-6.536a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-1.414.586H8v-2.414A2 2 0 018.586 12.6z"/>
            </svg>
          </button>
          <button class="btn-icon text-brown-400 hover:text-red-500" title="Hapus" onclick="bukaModalHapus(${p.id})">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            </svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  // ===== FORM TAMBAH =====
  function toggleFormTambah() {
    formVisible = !formVisible;
    const form = document.getElementById('formTambah');
    const btn  = document.getElementById('btnTambah');
    if (formVisible) {
      form.classList.remove('hidden');
      form.classList.add('animate-slideDown');
      btn.classList.add('bg-brown-500','text-white');
    } else {
      form.classList.add('hidden');
      btn.classList.remove('bg-brown-500','text-white');
      resetFormTambah();
    }
  }

  function resetFormTambah() {
    ['inp-nama','inp-stok','inp-harga','inp-kategori','inp-status'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  function simpanProdukBaru() {
    const nama     = document.getElementById('inp-nama').value.trim();
    const stok     = parseInt(document.getElementById('inp-stok').value) || 0;
    const harga    = document.getElementById('inp-harga').value.trim() || 'Rp 0';
    const kategori = document.getElementById('inp-kategori').value;
    const status   = document.getElementById('inp-status').value.trim() || 'Tersedia';
    if (!nama) { showToast('⚠️ Nama produk wajib diisi!'); return; }
    const emojis = ['🍰','🍪','🥐','🧁','🍫','🧇','☕','🎂','🍓'];
    produkList.push({ id: nextId++, nama, harga, stok, kategori: kategori||'Umum', status, emoji: emojis[Math.floor(Math.random()*emojis.length)] });
    render();
    toggleFormTambah();
    showToast('✅ Produk berhasil ditambahkan!');
  }

  // ===== MODAL EDIT =====
  function bukaModalEdit(id) {
    editTarget = produkList.find(p => p.id === id);
    if (!editTarget) return;
    document.getElementById('editNamaJudul').textContent = editTarget.nama;
    document.getElementById('edit-nama').value     = editTarget.nama;
    document.getElementById('edit-stok').value     = editTarget.stok;
    document.getElementById('edit-harga').value    = editTarget.harga;
    document.getElementById('edit-kategori').value = editTarget.kategori;
    document.getElementById('edit-status').value   = editTarget.status;
    document.getElementById('modalEdit').classList.remove('hidden');
  }

  function tutupModalEdit() {
    document.getElementById('modalEdit').classList.add('hidden');
    editTarget = null;
  }

  function simpanEdit() {
    if (!editTarget) return;
    const idx = produkList.findIndex(p => p.id === editTarget.id);
    produkList[idx] = {
      ...produkList[idx],
      nama:     document.getElementById('edit-nama').value.trim()     || produkList[idx].nama,
      stok:     parseInt(document.getElementById('edit-stok').value)  || 0,
      harga:    document.getElementById('edit-harga').value.trim()    || produkList[idx].harga,
      kategori: document.getElementById('edit-kategori').value        || produkList[idx].kategori,
      status:   document.getElementById('edit-status').value.trim()   || produkList[idx].status,
    };
    tutupModalEdit();
    render();
    showToast('✏️ Produk berhasil diperbarui!');
  }

  // ===== MODAL HAPUS =====
  function bukaModalHapus(id) {
    hapusTarget = produkList.find(p => p.id === id);
    if (!hapusTarget) return;
    document.getElementById('hapusNama').textContent  = '"' + hapusTarget.nama + '"';
    document.getElementById('hapusEmoji').textContent = hapusTarget.emoji;
    document.getElementById('modalHapus').classList.remove('hidden');
  }

  function tutupModalHapus() {
    document.getElementById('modalHapus').classList.add('hidden');
    hapusTarget = null;
  }

  function konfirmasiHapus() {
    if (!hapusTarget) return;
    produkList = produkList.filter(p => p.id !== hapusTarget.id);
    tutupModalHapus();
    render();
    showToast('🗑️ Produk berhasil dihapus!');
  }

  // ===== TOAST =====
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.remove('hidden');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.add('hidden'), 3000);
  }

  // ===== CLOSE MODAL ON BACKDROP CLICK =====
  document.getElementById('modalEdit').addEventListener('click', function(e) {
    if (e.target === this) tutupModalEdit();
  });
  document.getElementById('modalHapus').addEventListener('click', function(e) {
    if (e.target === this) tutupModalHapus();
  });

  // ===== INIT =====
  render();
</script>
</body>
</html>
